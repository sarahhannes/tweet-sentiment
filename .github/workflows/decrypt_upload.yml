name: Workflows with large secrets

on: workflow_dispatch

jobs:
  Upload:
    name: My Job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Decrypt encrypted credentials
        run: ./.github/scripts/decrypt_secret.sh
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.CLIENT_SECRET_PASSPHRASE }}
      - name: Test overwritting data.txt on Google Drive
        run: |
            python upload_to_gdrive.py
