name: Scrape
on:
  schedule:
    # Runs "at minute 0 every hour" (see https://crontab.guru)
    - cron: '0 * * * *'

defaults:
  run:
    # set common working directory for all (tasks?) as the root repository directory
    working-directory: .
    
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "Scraping"
  Scraping:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal access token during push.
          fetch-depth: 0

      - uses: szenius/set-timezone@v1.0
        with:
          timezoneLinux: "Asia/Singapore"
          timezoneMacos: "Asia/Singapore"
          timezoneWindows: "Singapore Standard Time"

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.6

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - name: Scrape for new data and append to file
        run: |
            echo "Dynamically get current datetime - 2 hour and save it in `$since variable"
            $since = [DateTime]::Now.AddHours(-2).ToString('yyyy-MM-dd HH:mm:ss')
            echo "Scrape since $since and save scraped output to `$output variable"
            echo "The output should be appended to the same file"
            $output = twint -s \#dhl --since $since --hashtags --stats -l en -o new_data_appended.txt
            echo "Printing out the output to console"
            $output

      - name: Commit files
        run: |
          git config --global user.email "siti.sarah.a.hannes@gmail.com"
          git config --global user.name "Sarah Hannes"
          git pull
          git add .
          git commit -m "Scrape using GH Action $(date)"
          git push --set-upstream origin dev
        env:
          REPO_KEY: ${{secrets.PAT}}
          username: SarahHannes #github-actions

      - name: GitHub Push
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{secrets.PAT}}
          branch: dev
          directory: .
